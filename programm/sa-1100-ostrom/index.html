<!DOCTYPE html><html lang="de"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Politische Kommunikation · Open Summit 2026</title><meta name="description" content="Open Summit 2026 · 25.–26. September, Alte Münze Berlin. Ein Ticket, zwei Tage: College Freedom Forum mit der Human Rights Foundation + Open Summit."><meta name="theme-color" content="#1E5F5A"><link rel="icon" href="/favicon.svg" type="image/svg+xml"><link rel="canonical" href="https://opensummit.berlin/programm/sa-1100-ostrom/"><meta property="og:type" content="website"><meta property="og:site_name" content="Open Summit 2026"><meta property="og:title" content="Politische Kommunikation · Open Summit 2026"><meta property="og:description" content="Open Summit 2026 · 25.–26. September, Alte Münze Berlin. Ein Ticket, zwei Tage: College Freedom Forum mit der Human Rights Foundation + Open Summit."><meta property="og:url" content="https://opensummit.berlin/programm/sa-1100-ostrom/"><meta property="og:image" content="https://opensummit.berlin/assets/og.jpg"><meta property="og:locale" content="de_DE"><meta property="og:locale:alternate" content="en_US"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="Politische Kommunikation · Open Summit 2026"><meta name="twitter:description" content="Open Summit 2026 · 25.–26. September, Alte Münze Berlin. Ein Ticket, zwei Tage: College Freedom Forum mit der Human Rights Foundation + Open Summit."><meta name="twitter:image" content="https://opensummit.berlin/assets/og.jpg"><link rel="stylesheet" href="/fonts.css"><link rel="stylesheet" href="/_astro/datenschutz.BtZpSAy9.css"></head> <body> <nav class="topnav"> <a class="brand" href="/"> <span class="brand-box">Open Summit &rsquo;26</span> <span class="brand-tag" data-de="Das Gipfeltreffen der Freiheit" data-en="The Summit of Freedom">Das Gipfeltreffen der Freiheit</span> </a> <div class="nav-right"> <a class="n -de="Angaben folgen" data-en="Angaben folgen">Angaben folgen</p> </div> </a> </div> </div> </div> </section>  </main> <script>
      (function () {
        // Sprache (clientseitiger Umschalter, de/en über data-Attribute)
        var btns = document.querySelectorAll('.lang');
        var lang = 'de';
        function apply(l) {
          lang = l;
          document.documentElement.lang = l;
          document.querySelectorAll('[data-de]').forEach(function (el) {
            var v = el.getAttribute('data-' + l);
            if (v !== null) el.innerHTML = v;
          });
          btns.forEach(function (b) { b.textContent = l === 'de' ? 'EN' : 'DE'; });
        }
        var p = new URLSearchParams(location.search);
        apply(p.get('lang') === 'en' ? 'en' : 'de');
        btns.forEach(function (b) {
          b.addEventListener('click', function () { apply(lang === 'de' ? 'en' : 'de'); });
        });

        // Programm-Tabs
        document.querySelectorAll('.tabbtn').forEach(function (b) {
          b.addEventListener('click', function () {
            document.querySelectorAll('.tabbtn').forEach(function (x) { x.classList.remove('active'); });
            document.querySelectorAll('.day').forEach(function (x) { x.classList.remove('active'); });
            b.classList.add('active');
            var d = document.getElementById(b.getAttribute('data-day'));
            if (d) d.classList.add('active');
          });
        });
        // Tageskarten → passenden Tab aktivieren
        document.querySelectorAll('.day-card[data-go]').forEach(function (c) {
          c.addEventListener('click', function () {
            var d = c.getAttribute('data-go');
            document.querySelectorAll('.tabbtn').forEach(function (x) { x.classList.remove('active'); });
            document.querySelectorAll('.day').forEach(function (x) { x.classList.remove('active'); });
            var b = document.querySelector('.tabbtn[data-day="' + d + '"]');
            if (b) b.classList.add('active');
            var pn = document.getElementById(d);
            if (pn) pn.classList.add('active');
          });
        });

        // Hamburger-Menü
        var mb = document.querySelector('.menu-btn');
        var ov = document.querySelector('.menu-overlay');
        if (mb && ov) {
          var setMenu = function (open) {
            mb.setAttribute('aria-expanded', open ? 'true' : 'false');
            mb.setAttribute('aria-label', open ? 'Menü schließen' : 'Menü öffnen');
            ov.classList.toggle('open', open);
            document.body.classList.toggle('menu-open', open);
          };
          mb.addEventListener('click', function () { setMenu(mb.getAttribute('aria-expanded') !== 'true'); });
          document.addEventListener('keydown', function (e) { if (e.key === 'Escape') setMenu(false); });
          ov.querySelectorAll('a').forEach(function (a) { a.addEventListener('click', function () { setMenu(false); }); });
        }

        // Nav beim Scrollen ausblenden
        var nav = document.querySelector('.topnav');
        var lastY = window.scrollY || 0;
        if (nav) {
          window.addEventListener('scroll', function () {
            var y = window.scrollY;
            if (y <= 80) nav.classList.remove('nav-hidden');
            else if (y > lastY + 4) nav.classList.add('nav-hidden');
            else if (y < lastY - 4) nav.classList.remove('nav-hidden');
            lastY = y;
          }, { passive: true });
        }

        // Galerie: am Desktop mit der Maus ziehen (Touch/Trackpad scrollt nativ)
        var gal = document.querySelector('.gallery');
        if (gal) {
          var down = false, startX = 0, startScroll = 0;
          gal.addEventListener('pointerdown', function (e) {
            if (e.pointerType !== 'mouse') return;
            down = true; startX = e.clientX; startScroll = gal.scrollLeft;
            gal.classList.add('dragging');
          });
          window.addEventListener('pointermove', function (e) {
            if (!down) return;
            gal.scrollLeft = startScroll - (e.clientX - startX);
          });
          window.addEventListener('pointerup', function () {
            down = false; gal.classList.remove('dragging');
          });
        }
      })();
    </script> </body> </html>
